version: '3'

vars:
  # Orbit propagation backend. Override with: ORBIT_BACKEND=skyfield task e1
  # Valid values: brahe (default), skyfield
  ORBIT_BACKEND: '{{.ORBIT_BACKEND | default "brahe"}}'

tasks:
  setup:
    desc: Install all dependencies from pyproject.toml
    cmds:
      - uv sync

  # ── individual experiments ─────────────────────────────────────────────────
  e1:
    desc: "E1 - Core performance: ORDI vs all 8 baselines (no faults)"
    env:
      ORBIT_BACKEND: '{{.ORBIT_BACKEND}}'
    cmds:
      - uv run python -m ordi.main run E1

  e2:
    desc: "E2 - Fault type profile: ORDI under each of 7 fault types"
    env:
      ORBIT_BACKEND: '{{.ORBIT_BACKEND}}'
    cmds:
      - uv run python -m ordi.main run E2

  e3:
    desc: "E3 - Fault intensity sweep: ORDI vs B5 vs B6 at 0-50% fault rates"
    env:
      ORBIT_BACKEND: '{{.ORBIT_BACKEND}}'
    cmds:
      - uv run python -m ordi.main run E3

  e4:
    desc: "E4 - Scalability: ORDI vs B5 across 12-60 satellites"
    env:
      ORBIT_BACKEND: '{{.ORBIT_BACKEND}}'
    cmds:
      - uv run python -m ordi.main run E4

  e5:
    desc: "E5 - Deadline tightness: ORDI vs B2 vs B4 at 60-600s slack"
    env:
      ORBIT_BACKEND: '{{.ORBIT_BACKEND}}'
    cmds:
      - uv run python -m ordi.main run E5

  e6:
    desc: "E6 - Lambda_R sweep: replication penalty effect on ORDI"
    env:
      ORBIT_BACKEND: '{{.ORBIT_BACKEND}}'
    cmds:
      - uv run python -m ordi.main run E6

  e7:
    desc: "E7 - Correlated failures: ORDI vs B6 under plane outage"
    env:
      ORBIT_BACKEND: '{{.ORBIT_BACKEND}}'
    cmds:
      - uv run python -m ordi.main run E7

  e8:
    desc: "E8 - ILP vs greedy optimality gap (small instances)"
    env:
      ORBIT_BACKEND: '{{.ORBIT_BACKEND}}'
    cmds:
      - uv run python -m ordi.main run E8

  cots:
    desc: "COTS - ORDI effectiveness with MobiCom24/BUPT-1 Atlas 200DK measurements"
    env:
      ORBIT_BACKEND: '{{.ORBIT_BACKEND}}'
    cmds:
      - uv run python -m ordi.main run COTS

  # ── run all experiments ────────────────────────────────────────────────────
  run-all:
    desc: Run all experiments E1-E8 sequentially
    cmds:
      - task: e1
      - task: e2
      - task: e3
      - task: e4
      - task: e5
      - task: e6
      - task: e7
      - task: e8

  # ── plotting ───────────────────────────────────────────────────────────────
  plot:
    desc: Generate all figures from completed experiment CSVs
    cmds:
      - uv run python -m ordi.main plot all

  plot-e1:
    desc: Plot E1 figure only
    cmds:
      - uv run python -m ordi.main plot E1

  plot-cots:
    desc: Plot COTS measurement-backed evaluation figure only
    cmds:
      - uv run python -m ordi.main plot COTS

  # ── run all then plot ──────────────────────────────────────────────────────
  all:
    desc: Run all experiments then generate all figures
    cmds:
      - task: run-all
      - task: plot

  # ── utilities ─────────────────────────────────────────────────────────────
  results:
    desc: List all result CSVs
    cmds:
      - ls -lh results/*.csv 2>/dev/null || echo "No results yet"

  clean:
    desc: Remove all experiment results and figures
    cmds:
      - rm -rf results/

  check:
    desc: Smoke-test all module imports
    cmds:
      - uv run python -c "from ordi.eval.experiments import ALL_EXPERIMENTS; print('OK:', list(ALL_EXPERIMENTS.keys()))"

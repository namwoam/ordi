version: '3'

tasks:
  setup:
    desc: Install all dependencies from pyproject.toml
    cmds:
      - uv sync

  # ── individual experiments ─────────────────────────────────────────────────
  e1:
    desc: "E1 - Core performance under matched moderate random faults"
    cmds:
      - uv run python -m ordi.main run E1

  e2:
    desc: "E2 - Fault intensity: ORDI vs nonredundant and full replication"
    cmds:
      - uv run python -m ordi.main run E2

  e3:
    desc: "E3 - Correlated failures: ORDI vs full and random replication"
    cmds:
      - uv run python -m ordi.main run E3

  e4:
    desc: "E4 - Scalability: ORDI vs greedy nonredundant across request loads"
    cmds:
      - uv run python -m ordi.main run E4

  # ── run all experiments ────────────────────────────────────────────────────
  run-all:
    desc: Run the focused E1-E4 evaluations sequentially
    cmds:
      - task: e1
      - task: e2
      - task: e3
      - task: e4

  # ── plotting ───────────────────────────────────────────────────────────────
  plot:
    desc: Generate all figures from completed experiment CSVs
    cmds:
      - uv run python -m ordi.main plot all

  plot-e1:
    desc: Plot E1 figure only
    cmds:
      - uv run python -m ordi.main plot E1

  # ── run all then plot ──────────────────────────────────────────────────────
  all:
    desc: Run all experiments then generate all figures
    cmds:
      - task: run-all
      - task: plot

  # ── utilities ─────────────────────────────────────────────────────────────
  results:
    desc: List all result CSVs
    cmds:
      - ls -lh results/*.csv 2>/dev/null || echo "No results yet"

  clean:
    desc: Remove all experiment results and figures
    cmds:
      - rm -rf results/

  check:
    desc: Smoke-test all module imports
    cmds:
      - uv run python -c "from ordi.eval.experiments import ALL_EXPERIMENTS; print('OK:', list(ALL_EXPERIMENTS.keys()))"

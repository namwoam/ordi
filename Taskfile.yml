version: '3'

vars:
  PYTHON: .venv/bin/python

tasks:
  setup:
    desc: Create venv and install all dependencies
    cmds:
      - uv venv .venv
      - uv pip install --python .venv/bin/python skyfield networkx simpy pulp numpy scipy pandas matplotlib tqdm requests pymupdf

  # ── individual experiments ─────────────────────────────────────────────────
  e1:
    desc: "E1 - Core performance: ORDI vs all 8 baselines (no faults)"
    cmds:
      - "{{.PYTHON}} -m ordi.main run E1"

  e2:
    desc: "E2 - Fault type profile: ORDI under each of 7 fault types"
    cmds:
      - "{{.PYTHON}} -m ordi.main run E2"

  e3:
    desc: "E3 - Fault intensity sweep: ORDI vs B5 vs B6 at 0-50% fault rates"
    cmds:
      - "{{.PYTHON}} -m ordi.main run E3"

  e4:
    desc: "E4 - Scalability: ORDI vs B5 across 12-60 satellites"
    cmds:
      - "{{.PYTHON}} -m ordi.main run E4"

  e5:
    desc: "E5 - Deadline tightness: ORDI vs B2 vs B4 at 60-600s slack"
    cmds:
      - "{{.PYTHON}} -m ordi.main run E5"

  e6:
    desc: "E6 - Lambda_R sweep: replication penalty effect on ORDI"
    cmds:
      - "{{.PYTHON}} -m ordi.main run E6"

  e7:
    desc: "E7 - Correlated failures: ORDI vs B6 under plane outage"
    cmds:
      - "{{.PYTHON}} -m ordi.main run E7"

  e8:
    desc: "E8 - ILP vs greedy optimality gap (small instances)"
    cmds:
      - "{{.PYTHON}} -m ordi.main run E8"

  # ── run all experiments ────────────────────────────────────────────────────
  run-all:
    desc: Run all experiments E1-E8 sequentially
    cmds:
      - task: e1
      - task: e2
      - task: e3
      - task: e4
      - task: e5
      - task: e6
      - task: e7
      - task: e8

  # ── plotting ───────────────────────────────────────────────────────────────
  plot:
    desc: Generate all figures from completed experiment CSVs
    cmds:
      - "{{.PYTHON}} -m ordi.main plot all"

  plot-e1:
    desc: Plot E1 figure only
    cmds:
      - "{{.PYTHON}} -m ordi.main plot E1"

  # ── run all then plot ──────────────────────────────────────────────────────
  all:
    desc: Run all experiments then generate all figures
    cmds:
      - task: run-all
      - task: plot

  # ── utilities ─────────────────────────────────────────────────────────────
  results:
    desc: List all result CSVs
    cmds:
      - ls -lh results/*.csv 2>/dev/null || echo "No results yet"

  clean:
    desc: Remove all experiment results and figures
    cmds:
      - rm -rf results/

  check:
    desc: Smoke-test all module imports
    cmds:
      - "{{.PYTHON}} -c \"from ordi.eval.experiments import ALL_EXPERIMENTS; print('OK:', list(ALL_EXPERIMENTS.keys()))\""
